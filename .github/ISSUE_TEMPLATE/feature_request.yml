name: Feature request
description: Suggest a new cheat, debug command, or quality-of-life improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - In-game cheat
        - Desktop UI
        - inspect.py / debug pipe
        - Auto-updater / packaging
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What would you like ZeusMod to do that it doesn't already?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why does it matter
      description: What problem does this solve, or what makes the current behaviour painful?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've already tried?
    validations:
      required: false
