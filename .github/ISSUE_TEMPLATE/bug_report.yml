name: Bug report
description: Something is broken or behaves unexpectedly inside ZeusMod.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please fill in as much as
        you can — partial reports are still useful, but logs and reproduction
        steps make a fix much faster.

  - type: input
    id: zeusmod-version
    attributes:
      label: ZeusMod version
      description: Visible in the titlebar (e.g. v1.5.0).
      placeholder: v1.5.0
    validations:
      required: true

  - type: input
    id: icarus-build
    attributes:
      label: Icarus build
      description: Steam → Icarus → Properties → Updates → Build ID.
      placeholder: e.g. 13456789
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      multiple: true
      options:
        - Desktop launcher (Electron app)
        - In-game ImGui overlay
        - Cheat behaviour (e.g. No Weight, Free Craft)
        - Native injector
        - inspect.py debug client
        - Auto-updater
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What did you think should happen instead?
    validations:
      required: false

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch Icarus and load into a prospect
        2. Click Attach in ZeusMod
        3. Toggle …
        4. Observe …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: |
        Anything from the in-game console or `inspect.py` that's relevant.
        For Electron crashes, see `%APPDATA%\ZeusMod\logs\`.
      render: text
    validations:
      required: false
