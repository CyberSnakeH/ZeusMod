name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build IcarusInjector
        run: msbuild IcarusInjector/IcarusInjector.vcxproj /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

      - name: Build IcarusInternal
        run: msbuild IcarusInternal/IcarusInternal.vcxproj /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Electron dependencies
        run: |
          cd app
          npm ci
        shell: pwsh

      - name: Prepare Release
        run: |
          New-Item -ItemType Directory -Force -Path "release" | Out-Null
          New-Item -ItemType Directory -Force -Path "app/bin" | Out-Null

          Remove-Item "release\*" -Force -ErrorAction SilentlyContinue
          Remove-Item "app\bin\*" -Force -ErrorAction SilentlyContinue

          # Copy the exact maintained native outputs into the Electron bundle.
          Copy-Item "IcarusInjector/bin/Release/IcarusInjector.exe" "app/bin/IcarusInjector.exe"
          Copy-Item "IcarusInjector/bin/Release/IcarusInternal.dll" "app/bin/IcarusInternal.dll"

          # Standalone native package
          Copy-Item "app/bin/IcarusInjector.exe" "release/"
          Copy-Item "app/bin/IcarusInternal.dll" "release/"
          Compress-Archive -Path "release/IcarusInjector.exe", "release/IcarusInternal.dll" -DestinationPath "ZeusMod-Standalone-${{ github.ref_name }}.zip"

          # Electron installer
          cd app
          npm run dist
          cd ..
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ZeusMod-Standalone-${{ github.ref_name }}.zip
            app/dist/ZeusMod-Setup-*.exe
          body: |
            ## ZeusMod ${{ github.ref_name }}

            ### Highlights
            - God Mode
            - Infinite Stamina / Armor / Oxygen
            - No Hunger / Thirst
            - Free Craft
            - No Weight Limit
            - Speed Hack
            - Time Lock

            ### How to Use
            1. Extract the zip.
            2. Launch Icarus and enter a prospect.
            3. Run `IcarusInjector.exe` as Administrator.
            4. Click **ATTACH TO ICARUS**.
            5. Use the desktop app or in-game overlay to manage features.

            > Run as Administrator. Intended for solo or private sessions only.
          draft: false
          prerelease: false
